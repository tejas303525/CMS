services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    image: cms-backend:${BACKEND_VERSION:-0.0.1}
    restart: unless-stopped
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: church
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-before-production}
    depends_on:
      - mongo
    ports:
      - "8001:8001"

  frontend:
    image: cms-frontend:${FRONTEND_VERSION:-0.1.0}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mongo_data:
